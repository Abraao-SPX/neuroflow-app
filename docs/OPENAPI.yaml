openapi: 3.0.3
info:
  title: NeuroFlow API
  version: 1.0.0
  description: REST API for NeuroFlow tasks, check-ins, triggers and authentication.
servers:
  - url: http://localhost:3000/api
security:
  - bearerAuth: []
paths:
  /auth/register:
    post:
      tags: [Auth]
      security: []
      summary: Register a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
  /auth/login:
    post:
      tags: [Auth]
      security: []
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/refresh:
    post:
      tags: [Auth]
      security: []
      summary: Rotate refresh token and return a new access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Token refreshed
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/logout:
    post:
      tags: [Auth]
      security: []
      summary: Revoke a refresh token
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Logged out
  /auth/forgot-password:
    post:
      tags: [Auth]
      security: []
      summary: Request password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Reset instructions accepted
  /auth/reset-password:
    post:
      tags: [Auth]
      security: []
      summary: Reset password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token:
                  type: string
                newPassword:
                  type: string
      responses:
        '200':
          description: Password updated
  /auth/me:
    get:
      tags: [Auth]
      summary: Return authenticated user
      responses:
        '200':
          description: Current user
        '401':
          $ref: '#/components/responses/Unauthorized'
  /tasks:
    get:
      tags: [Tasks]
      summary: List user tasks
      responses:
        '200':
          description: Task list
    post:
      tags: [Tasks]
      summary: Create task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Task created
  /tasks/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Tasks]
      summary: Get task
      responses:
        '200':
          description: Task
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Tasks]
      summary: Replace task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplaceTaskRequest'
      responses:
        '200':
          description: Task replaced
    patch:
      tags: [Tasks]
      summary: Patch task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchTaskRequest'
      responses:
        '200':
          description: Task updated
    delete:
      tags: [Tasks]
      summary: Delete task
      responses:
        '204':
          description: Deleted
  /checkins:
    get:
      tags: [Check-ins]
      summary: List user check-ins
      responses:
        '200':
          description: Check-in list
    post:
      tags: [Check-ins]
      summary: Create check-in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCheckinRequest'
      responses:
        '201':
          description: Check-in created
  /checkins/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Check-ins]
      summary: Get check-in
      responses:
        '200':
          description: Check-in
    put:
      tags: [Check-ins]
      summary: Replace check-in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCheckinRequest'
      responses:
        '200':
          description: Check-in replaced
    patch:
      tags: [Check-ins]
      summary: Patch check-in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchCheckinRequest'
      responses:
        '200':
          description: Check-in updated
    delete:
      tags: [Check-ins]
      summary: Delete check-in
      responses:
        '204':
          description: Deleted
  /triggers:
    get:
      tags: [Triggers]
      summary: List triggers
      responses:
        '200':
          description: Trigger list
    post:
      tags: [Triggers]
      summary: Create trigger, admin only
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TriggerRequest'
      responses:
        '201':
          description: Trigger created
  /triggers/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Triggers]
      summary: Get trigger
      responses:
        '200':
          description: Trigger
    put:
      tags: [Triggers]
      summary: Replace trigger, admin only
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TriggerRequest'
      responses:
        '200':
          description: Trigger replaced
    patch:
      tags: [Triggers]
      summary: Patch trigger, admin only
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchTriggerRequest'
      responses:
        '200':
          description: Trigger updated
    delete:
      tags: [Triggers]
      summary: Delete trigger, admin only
      responses:
        '204':
          description: Deleted
  /admin/users:
    get:
      tags: [Admin]
      summary: List users, admin only
      responses:
        '200':
          description: User list
  /admin/users/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    delete:
      tags: [Admin]
      summary: Delete user, admin only
      responses:
        '204':
          description: Deleted
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
    RegisterRequest:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 100
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    CreateTaskRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          maxLength: 150
        description:
          type: string
          nullable: true
    ReplaceTaskRequest:
      type: object
      required: [title, completed]
      properties:
        title:
          type: string
          maxLength: 150
        description:
          type: string
          nullable: true
        completed:
          type: boolean
    PatchTaskRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 150
        description:
          type: string
          nullable: true
        completed:
          type: boolean
    CreateCheckinRequest:
      type: object
      required: [humor, gatilhos]
      properties:
        humor:
          type: string
          maxLength: 50
        gatilhos:
          type: array
          items:
            oneOf:
              - type: string
              - type: integer
        dataCheckin:
          type: string
          format: date
    PatchCheckinRequest:
      type: object
      properties:
        humor:
          type: string
          maxLength: 50
        gatilhos:
          type: array
          items:
            oneOf:
              - type: string
              - type: integer
        dataCheckin:
          type: string
          format: date
    TriggerRequest:
      type: object
      required: [nome]
      properties:
        nome:
          type: string
          maxLength: 50
        icone:
          type: string
          nullable: true
          maxLength: 50
    PatchTriggerRequest:
      type: object
      properties:
        nome:
          type: string
          maxLength: 50
        icone:
          type: string
          nullable: true
          maxLength: 50
