services:
  db:
    image: mysql:8.0
    container_name: neuroflow-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MYSQL_DATABASE: ${DB_NAME:-neuroflow_db}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # O MySQL no Docker roda automaticamente arquivos .sql contidos nessa pasta ao inicializar
      - ./backend/database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - neuroflow-net

  backend:
    build:
      context: ./backend
    container_name: neuroflow-backend
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=db
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - DB_NAME=${DB_NAME:-neuroflow_db}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - TOKEN_EXPIRATION=${TOKEN_EXPIRATION:-1h}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET:?REFRESH_TOKEN_SECRET is required}
      - REFRESH_TOKEN_EXPIRATION=${REFRESH_TOKEN_EXPIRATION:-30d}
      - RESET_TOKEN_EXPIRATION_MINUTES=${RESET_TOKEN_EXPIRATION_MINUTES:-5}
      - CORS_ORIGINS=${CORS_ORIGINS:?CORS_ORIGINS is required}
      - AUTO_FIX_AUTH_SCHEMA=${AUTO_FIX_AUTH_SCHEMA:-false}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - neuroflow-net

networks:
  neuroflow-net:

volumes:
  mysql_data:
  
